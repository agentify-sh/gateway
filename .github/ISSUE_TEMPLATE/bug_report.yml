name: Bug report
description: Report a reproducible problem in the Agentify-maintained TensorZero fork.
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For suspected security vulnerabilities, do not open a public issue. Follow SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, config, request payloads, or a minimal example.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release version, image tag, or commit SHA.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, deployment method, database backend, provider, and relevant versions.
  - type: textarea
    id: logs
    attributes:
      label: Logs or traces
      render: text
