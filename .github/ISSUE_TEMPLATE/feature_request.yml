name: Feature request
description: Propose a change or compatibility improvement.
labels:
  - enhancement
  - needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Note API, config, database, provider, package, or deployment impact.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
