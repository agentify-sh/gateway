name: Question
description: Ask for help with setup, usage, or maintenance status.
labels:
  - question
  - needs-triage
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include config, deployment method, provider, and links where useful.
